<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="One Course">
  <title>One Course — LinkedIn logo mark</title>

  <!-- Square LinkedIn company logo: intentional quad frame + classic rosette.
       Opaque (no transparency) so LinkedIn does not inject an extra white mat. -->

  <!-- Inner white field (full canvas first; border drawn on top edges) -->
  <rect width="512" height="512" fill="#ffffff"/>

  <!-- Quad perimeter (brand order = rosette: mint top, yellow left, red bottom, blue right).
       Border thickness 36 (~7%). Top/bottom span full width so corners are mint/red. -->
  <rect x="0"   y="0"   width="512" height="36"  fill="#06D6A0"/>
  <rect x="0"   y="476" width="512" height="36"  fill="#EF476F"/>
  <rect x="0"   y="36"  width="36"  height="440" fill="#FFD166"/>
  <rect x="476" y="36"  width="36"  height="440" fill="#118AB2"/>

  <!-- Rosette centered in white field. Original geometry (cx=65,cy=65,r=57);
       scaled so disc diameter ≈ 74% of the 440px inner square. -->
  <g transform="translate(256 256) scale(2.856) translate(-65 -65)">
    <circle cx="65" cy="65" r="57" fill="#ffffff"/>
    <path d="M65,65 L26.816,26.816 A54,54 0 0 1 103.184,26.816 Z" fill="#06D6A0"/>
    <path d="M65,65 L26.816,103.184 A54,54 0 0 1 26.816,26.816 Z" fill="#FFD166"/>
    <path d="M65,65 L103.184,103.184 A54,54 0 0 1 26.816,103.184 Z" fill="#EF476F"/>
    <path d="M65,65 L103.184,26.816 A54,54 0 0 1 103.184,103.184 Z" fill="#118AB2"/>
    <g stroke="#ffffff" stroke-width="4.6" stroke-linecap="round">
      <line x1="103.95" y1="26.05" x2="26.05" y2="103.95"/>
      <line x1="26.05" y1="26.05" x2="103.95" y2="103.95"/>
    </g>
    <circle cx="65" cy="65" r="31.32" fill="#ffffff"/>
    <path d="M74.2529,79.7446V77.7724H67.9697V50.9882C67.9697,49.6582 67.8779,49.6582 66.4102,49.6582C63.0164,52.5933 57.9255,52.5933 56.9164,52.5933H56.0451V54.5656H56.9164C58.5218,54.5656 60.9524,54.2904 62.7870,53.6942V77.7724H56.4119V79.7446L65.3097,79.6528L74.2529,79.7446Z"
          fill="#0E6E8E"/>
  </g>
</svg>
