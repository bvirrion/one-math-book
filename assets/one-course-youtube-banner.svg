<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 1152" width="2048" height="1152" role="img" aria-label="One Course — one-course.com">
  <title>One Course — YouTube channel banner</title>

  <!-- YouTube channel art: 2048 × 1152, "safe area" = centered 1546 × 423
       (x 251–1797, y 364–788) — the only region visible on phones and
       desktop; the rest is bleed shown on TVs. The whole lockup sits
       inside it. Brand: THEME.md — pale ground, letterspaced wordmark,
       quad line. NO rosette: the channel avatar already carries it. -->

  <!-- Pale ground (ocPaleBlue) -->
  <rect width="2048" height="1152" fill="#DEEDF3"/>

  <!-- Soft white mid band (book-cover header feel), spanning the safe area -->
  <rect y="300" width="2048" height="552" fill="#FFFFFF" opacity="0.55"/>

  <!-- Slim top quad line (mint → yellow → red → blue) -->
  <g>
    <rect x="0"    y="0" width="512" height="26" fill="#06D6A0"/>
    <rect x="512"  y="0" width="512" height="26" fill="#FFD166"/>
    <rect x="1024" y="0" width="512" height="26" fill="#EF476F"/>
    <rect x="1536" y="0" width="512" height="26" fill="#118AB2"/>
  </g>

  <!-- ============ Centered lockup (inside the safe area) ============ -->

  <!-- Wordmark: bold sans, letterspaced (THEME: ocInk).
       Sized well inside the safe area: YouTube's device crops trim tighter
       than the nominal 1546 px, so keep ~200 px of margin on each side. -->
  <text x="1024" y="552" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="700" font-size="96" letter-spacing="10"
        fill="#1F2430">ONE-COURSE.COM</text>

  <!-- Tagline -->
  <text x="1024" y="628" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500" font-size="40" letter-spacing="1.5"
        fill="#0E6E8E">One coherent course &#183; kindergarten to bachelor&#x2019;s</text>

  <!-- Short centered quad rule under the lockup (book title-block separator) -->
  <g>
    <rect x="744"  y="676" width="140" height="10" fill="#06D6A0"/>
    <rect x="884"  y="676" width="140" height="10" fill="#FFD166"/>
    <rect x="1024" y="676" width="140" height="10" fill="#EF476F"/>
    <rect x="1164" y="676" width="140" height="10" fill="#118AB2"/>
  </g>

  <!-- Full-width bottom quad band (cover-style, in the TV bleed) -->
  <g>
    <rect x="0"    y="1042" width="512" height="110" fill="#06D6A0"/>
    <rect x="512"  y="1042" width="512" height="110" fill="#FFD166"/>
    <rect x="1024" y="1042" width="512" height="110" fill="#EF476F"/>
    <rect x="1536" y="1042" width="512" height="110" fill="#118AB2"/>
  </g>
</svg>
