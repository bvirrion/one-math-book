<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 130" width="600" height="130" role="img" aria-label="One Course — one-course.com">
  <title>One Course — one-course.com</title>

  <!-- ============ Rosette mark ============ -->
  <!-- White ground disc so the rosette reads on light or dark backgrounds -->
  <circle cx="65" cy="65" r="57" fill="#ffffff"/>
  <!-- Four quad wedges: mint (top), yellow (left), red (bottom), blue (right) -->
  <path d="M65,65 L26.816,26.816 A54,54 0 0 1 103.184,26.816 Z" fill="#06D6A0"/>
  <path d="M65,65 L26.816,103.184 A54,54 0 0 1 26.816,26.816 Z" fill="#FFD166"/>
  <path d="M65,65 L103.184,103.184 A54,54 0 0 1 26.816,103.184 Z" fill="#EF476F"/>
  <path d="M65,65 L103.184,26.816 A54,54 0 0 1 103.184,103.184 Z" fill="#118AB2"/>
  <!-- White diagonal cuts separating the wedges -->
  <g stroke="#ffffff" stroke-width="4.6" stroke-linecap="round">
    <line x1="103.95" y1="26.05" x2="26.05" y2="103.95"/>
    <line x1="26.05" y1="26.05" x2="103.95" y2="103.95"/>
  </g>
  <!-- White core circle (0.58 R) -->
  <circle cx="65" cy="65" r="31.32" fill="#ffffff"/>
  <!-- Bold serif "1" as an outlined path: perfectly centered on (65,65),
       independent of any font -->
  <path d="M54,55 L68.75,46 L68.75,80 L74.5,80 L74.5,84 L55.5,84 L55.5,80 L61.25,80 L61.25,51 Z"
        fill="#0E6E8E"/>

  <!-- ============ Wordmark ============ -->
  <text x="150" y="79" text-anchor="start"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="bold" font-size="40" letter-spacing="2.5" fill="#1F2430">ONE-COURSE.COM</text>
</svg>
