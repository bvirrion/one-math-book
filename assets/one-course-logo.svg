<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="One Course logo">
  <title>One Course</title>
  <!-- White ground disc so the rosette reads on light or dark backgrounds -->
  <circle cx="60" cy="60" r="57" fill="#ffffff"/>
  <!-- Four quad wedges: mint (top), yellow (left), red (bottom), blue (right) -->
  <path d="M60,60 L21.816,21.816 A54,54 0 0 1 98.184,21.816 Z" fill="#06D6A0"/>
  <path d="M60,60 L21.816,98.184 A54,54 0 0 1 21.816,21.816 Z" fill="#FFD166"/>
  <path d="M60,60 L98.184,98.184 A54,54 0 0 1 21.816,98.184 Z" fill="#EF476F"/>
  <path d="M60,60 L98.184,21.816 A54,54 0 0 1 98.184,98.184 Z" fill="#118AB2"/>
  <!-- White diagonal cuts separating the wedges -->
  <g stroke="#ffffff" stroke-width="4.6" stroke-linecap="round">
    <line x1="98.95" y1="21.05" x2="21.05" y2="98.95"/>
    <line x1="21.05" y1="21.05" x2="98.95" y2="98.95"/>
  </g>
  <!-- White core circle (0.58 R) holding the bold serif "1" -->
  <circle cx="60" cy="60" r="31.32" fill="#ffffff"/>
  <text x="60" y="60" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif" font-weight="bold"
        font-size="46" fill="#0E6E8E">1</text>
</svg>
