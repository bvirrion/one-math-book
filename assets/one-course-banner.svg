<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4200 700" width="4200" height="700" role="img" aria-label="One Course — one-course.com">
  <title>One Course — LinkedIn company banner</title>

  <!-- LinkedIn company cover: official recommended size 4200 × 700.
       Brand: THEME.md — pale ground, letterspaced wordmark, quad line.
       NO rosette: the page's logo already carries it (and overlays the
       cover at bottom-left, so the lockup stays centered and high). -->

  <!-- Pale ground (ocPaleBlue) -->
  <rect width="4200" height="700" fill="#DEEDF3"/>

  <!-- Soft white mid band (book-cover header feel) -->
  <rect y="80" width="4200" height="480" fill="#FFFFFF" opacity="0.55"/>

  <!-- Slim top quad line (mint → yellow → red → blue) -->
  <g>
    <rect x="0"    y="0" width="1050" height="18" fill="#06D6A0"/>
    <rect x="1050" y="0" width="1050" height="18" fill="#FFD166"/>
    <rect x="2100" y="0" width="1050" height="18" fill="#EF476F"/>
    <rect x="3150" y="0" width="1050" height="18" fill="#118AB2"/>
  </g>

  <!-- ============ Centered lockup (no rosette) ============ -->

  <!-- Wordmark: bold sans, letterspaced (THEME: ocInk) -->
  <text x="2100" y="330" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="700" font-size="170" letter-spacing="15"
        fill="#1F2430">ONE-COURSE.COM</text>

  <!-- Tagline -->
  <text x="2100" y="445" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500" font-size="58" letter-spacing="2"
        fill="#0E6E8E">One coherent course &#183; kindergarten to bachelor&#x2019;s</text>

  <!-- Short centered quad rule under the lockup (book title-block separator) -->
  <g>
    <rect x="1660" y="500" width="220" height="12" fill="#06D6A0"/>
    <rect x="1880" y="500" width="220" height="12" fill="#FFD166"/>
    <rect x="2100" y="500" width="220" height="12" fill="#EF476F"/>
    <rect x="2320" y="500" width="220" height="12" fill="#118AB2"/>
  </g>

  <!-- Full-width bottom quad band (cover-style) -->
  <g>
    <rect x="0"    y="628" width="1050" height="72" fill="#06D6A0"/>
    <rect x="1050" y="628" width="1050" height="72" fill="#FFD166"/>
    <rect x="2100" y="628" width="1050" height="72" fill="#EF476F"/>
    <rect x="3150" y="628" width="1050" height="72" fill="#118AB2"/>
  </g>
</svg>
