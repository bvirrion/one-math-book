name: Build and Release PDFs

on:
  push:
    tags:
      - 'v*'            # triggers on tags like v0.0.1, v1.2.3

permissions:
  contents: write       # needed to create releases and upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # need the tag's metadata for its date

      - name: Generate version info
        run: |
          DATE=$(git for-each-ref --format='%(creatordate:short)' "refs/tags/${GITHUB_REF_NAME}")
          printf '\\renewcommand{\\bookdate}{%s}\n'    "$DATE"            >  version.tex
          printf '\\renewcommand{\\bookversion}{%s}\n' "$GITHUB_REF_NAME" >> version.tex

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          # One entry file per book of the series.
          root_file: |
            one_math_book_primary_middle_school.tex
            one_math_book_high_school.tex
            one_math_book_university_year_1.tex
          latexmk_use_lualatex: false
          # latexmkrc in the repo sets pdflatex mode and build/ output.

      - name: Check for undefined references
        run: |
          ! grep -E "(Reference|Citation).*undefined" build/*.log

      - name: Name the PDFs with the version
        run: |
          for slug in primary_middle_school high_school university_year_1; do
            cp "build/one_math_book_${slug}.pdf" "one_math_book_${slug}_${GITHUB_REF_NAME}.pdf"
          done

      - name: Create release and attach PDFs
        uses: softprops/action-gh-release@v2
        with:
          files: one_math_book_*_${{ github.ref_name }}.pdf
