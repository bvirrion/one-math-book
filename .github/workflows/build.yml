name: Build PDF

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_lualatex: false
          # latexmkrc in the repo sets pdflatex mode and build/ output

      - name: Check for undefined references
        run: |
          ! grep -E "(Reference|Citation).*undefined" build/main.log

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: one-math-book
          path: build/main.pdf
